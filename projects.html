<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects | ATCON Construction Ltd</title>
  <meta name="description" content="Browse ATCON Construction Ltd's portfolio of residential and commercial projects — apartments, flat roofs, pitched roofs, hybrid and hidden roof designs.">
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>

  <header id="site-header"></header>

  <!-- Page Banner -->
  <div class="page-banner">
    <div class="container">
      <h1>Our Projects</h1>
      <p>A selection of recent construction and engineering works completed by ATCON.</p>
    </div>
  </div>

  <section class="projects-section">
    <div class="container">

      <!-- Filter Buttons -->
      <div class="project-filters">
        <button class="filter-btn active">All</button>
        <button class="filter-btn">Residential</button>
        <button class="filter-btn">Roofing</button>
        <button class="filter-btn">Apartments</button>
        <button class="filter-btn">Ongoing</button>
      </div>

      <!-- Projects Grid -->
      <div class="projects-grid">

        <div class="project-card" data-category="apartments residential">
          <img src="images/Apartments/1.jpg" alt="Apartments">
          <div class="project-overlay">
            <h3>Apartments</h3>
            <a href="gallery-apartments.html" class="btn">View Gallery</a>
          </div>
        </div>

        <div class="project-card" data-category="residential roofing">
          <img src="images/Flat_roof/flat-roof.jpeg" alt="Flat Roof Houses">
          <div class="project-overlay">
            <h3>Flat Roof Houses</h3>
            <a href="gallery-flat.html" class="btn">View Gallery</a>
          </div>
        </div>

        <div class="project-card" data-category="residential roofing">
          <img src="images/Pitched_roof/pitched-roof.png" alt="Pitched Roof Houses">
          <div class="project-overlay">
            <h3>Pitched Roof Houses</h3>
            <a href="gallery-pitched.html" class="btn">View Gallery</a>
          </div>
        </div>

        <div class="project-card" data-category="residential roofing">
          <img src="images/Hybrid_roof/hybrid-roof.jpeg" alt="Hybrid Roof Houses">
          <div class="project-overlay">
            <h3>Hybrid Roof Houses</h3>
            <a href="gallery-hybrid.html" class="btn">View Gallery</a>
          </div>
        </div>

        <div class="project-card" data-category="residential roofing">
          <img src="images/Hidden_roof/hidden-roof.png" alt="Hidden Roof Houses">
          <div class="project-overlay">
            <h3>Hidden Roof Houses</h3>
            <a href="gallery-hidden.html" class="btn">View Gallery</a>
          </div>
        </div>

        <div class="project-card" data-category="ongoing residential">
          <img src="images/ongoing projects/1.jpg" alt="Ongoing Projects">
          <div class="project-overlay">
            <h3>Ongoing Projects</h3>
            <a href="gallery-ongoing.html" class="btn">View Gallery</a>
          </div>
        </div>

      </div>

    </div>
  </section>

  <!-- WhatsApp Float -->
  <a href="https://wa.me/254798806154?text=Hello%20ATCON%20Construction,%20I%20would%20like%20to%20inquire%20about%20a%20project."
     class="whatsapp-float" target="_blank" rel="noopener" aria-label="Chat on WhatsApp">
    <i class="fab fa-whatsapp"></i>
  </a>

  <footer id="site-footer"></footer>
  <script src="script.js"></script>
</body>
</html>
